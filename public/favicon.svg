<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Back cloud (represents multiple accounts) -->
  <path d="M11 13a3 3 0 015.66-1.42 1.75 1.75 0 012.24 2.3A2.25 2.25 0 0120.5 18H9.5a2.75 2.75 0 01-.83-5.37A3 3 0 0111 13z" fill="white" fill-opacity="0.35" transform="translate(1, -1.5)"/>
  <!-- Front cloud (main cloud shape) -->
  <path d="M11 15a3.5 3.5 0 016.6-1.66 2 2 0 012.56 2.63A2.5 2.5 0 0121.5 21H9a3 3 0 01-1.17-5.76A3.5 3.5 0 0111 15z" fill="url(#cloud)"/>
  <!-- Nest lines under cloud -->
  <path d="M12 22.5c0 1.5 1.8 2.5 4 2.5s4-1 4-2.5" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M13.2 23.8c0 1 1.3 1.7 2.8 1.7s2.8-.7 2.8-1.7" stroke="white" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.7"/>
</svg>
